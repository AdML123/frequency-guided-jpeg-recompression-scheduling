name: ci
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-ci.txt
      - run: python -m pytest tests/test_imports.py tests/test_metrics.py tests/test_schedules.py tests/test_github_repo_delivery.py tests/test_secret_scan.py -q
      - run: python scripts/check_no_secrets.py
